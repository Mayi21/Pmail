name: Deploy PMail

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      KV_CACHE_ID: ${{ secrets.KV_CACHE_ID }}
      DOMAIN: ${{ secrets.DOMAIN }}
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            workers/api/package-lock.json
            workers/email/package-lock.json
            web/package-lock.json

      - name: Render wrangler.toml from templates
        run: |
          set -euo pipefail
          envsubst < workers/api/wrangler.toml.example > workers/api/wrangler.toml
          envsubst < workers/email/wrangler.toml.example > workers/email/wrangler.toml
          echo "--- workers/api/wrangler.toml ---"
          cat workers/api/wrangler.toml
          echo "--- workers/email/wrangler.toml ---"
          cat workers/email/wrangler.toml

      - name: Install API Worker dependencies
        working-directory: workers/api
        run: npm ci

      - name: Install Email Worker dependencies
        working-directory: workers/email
        run: npm ci

      - name: Install Web dependencies
        working-directory: web
        run: npm ci

      - name: Apply D1 database migrations
        working-directory: workers/api
        run: npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote

      - name: Verify JWT_SECRET is configured
        working-directory: workers/api
        run: |
          set -euo pipefail
          if ! npx wrangler secret list 2>/dev/null | grep -q '"JWT_SECRET"'; then
            echo "::error::JWT_SECRET 未配置。请先在本地执行 'node scripts/bootstrap.mjs' 推送 JWT_SECRET 后再触发部署。详见 docs/DEPLOYMENT.md §3.1。"
            exit 1
          fi
          echo "✓ JWT_SECRET 已配置"

      - name: Deploy API Worker
        working-directory: workers/api
        run: npx wrangler deploy

      - name: Deploy Email Worker
        working-directory: workers/email
        run: npx wrangler deploy

      - name: Bind catch-all to Email Worker
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4"
          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          # 1. Look up zone_id by DOMAIN
          ZONE_RESP=$(curl -fsS -H "$AUTH" "$API/zones?name=${DOMAIN}")
          ZONE_ID=$(echo "$ZONE_RESP" | jq -r '.result[0].id')
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "::error::Could not find Cloudflare zone for DOMAIN=${DOMAIN}. Check that the domain is on this account."
            echo "$ZONE_RESP"
            exit 1
          fi
          echo "Zone ID: $ZONE_ID"

          # 2. Bind catch-all rule to pmail-receiver Worker
          PUT_RESP=$(curl -fsS -X PUT \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            "$API/zones/${ZONE_ID}/email/routing/rules/catch_all" \
            -d '{
              "name": "PMail catch-all",
              "enabled": true,
              "matchers": [{ "type": "all" }],
              "actions": [{ "type": "worker", "value": ["pmail-receiver"] }]
            }')

          SUCCESS=$(echo "$PUT_RESP" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Failed to bind catch-all. CLOUDFLARE_API_TOKEN may need 'Zone:Email Routing:Edit' permission."
            echo "$PUT_RESP" | jq .
            exit 1
          fi
          echo "✓ catch-all rule bound to pmail-receiver Worker"

      - name: Build Web frontend
        working-directory: web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy Cloudflare Pages
        working-directory: web
        env:
          PAGES_PROJECT_NAME: ${{ secrets.PAGES_PROJECT_NAME }}
        run: npx wrangler pages deploy dist --project-name="$PAGES_PROJECT_NAME" --branch=main

      - name: Health check
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          set -euo pipefail
          if [ -z "${API_URL:-}" ]; then
            echo "API_URL not set; skipping health check"
            exit 0
          fi
          echo "Probing ${API_URL}/health"
          curl -fsS --retry 5 --retry-delay 5 --retry-connrefused "${API_URL}/health"
